<!DOCTYPE html>
<html>
<head>
  <title>Inspirational Enlivening</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff;
      text-align: center;
    }

    header {
      background: #111;
      color: gold;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      width: 280px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: gold;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      background: black;
      color: gold;
    }

    .section {
      margin-top: 40px;
    }

    .quote-box {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin-top: 5px;
    }

  </style>
</head>

<body>

<header>Inspirational Enlivening</header>

<div class="container">

  <!-- BOOK STORE -->
  <h2>📚 Our Books</h2>

  <div class="grid">

    <!-- BOOK 1 -->
    <div class="card">
      <img src="cover1.jpg">
      <h3>Fear of Failing</h3>
      <p>₦2000</p>
      <button onclick="buy('Fear of Failing')">Buy Now</button>
    </div>

    <!-- BOOK 2 -->
    <div class="card">
      <img src="cover2.jpg">
      <h3>Power of Discipline</h3>
      <p>₦2500</p>
      <button onclick="buy('Power of Discipline')">Buy Now</button>
    </div>

    <!-- BOOK 3 -->
    <div class="card">
      <img src="cover3.jpg">
      <h3>Mindset Shift</h3>
      <p>₦3000</p>
      <button onclick="buy('Mindset Shift')">Buy Now</button>
    </div>

  </div>

  <!-- OPAY SECTION -->
  <div class="section">
    <h2>💳 Pay via Opay</h2>
    <p><b>8166286285</b></p>

    <h3>Submit Payment Proof</h3>

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="book" placeholder="Book you are buying"></textarea>

    <button onclick="submitPayment()">Send via WhatsApp</button>
  </div>

  <!-- DAILY QUOTE -->
  <div class="section">
    <h2>✨ Daily Quote</h2>
    <div class="quote-box" id="quote"></div>
  </div>

</div>

<script>
let selectedBook = "";

function buy(book) {
  selectedBook = book;
  document.getElementById("book").value = book;
  window.scrollTo(0, document.body.scrollHeight);
}

function submitPayment() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let book = document.getElementById("book").value;

  if(name === "" || email === "" || book === "") {
    alert("Please fill all fields");
    return;
  }

  let message =
`Hello, I made payment via Opay.

Book: ${book}
Name: ${name}
Email: ${email}
Opay Number: 8166286285`;

  window.open(`https://wa.me/2348166286285?text=${encodeURIComponent(message)}`, "_blank");
}

/* DAILY QUOTES */
const quotes = [
  "Success begins when you conquer fear.",
  "Discipline builds destiny.",
  "Your mindset shapes your future.",
  "Fear is a liar—move anyway.",
  "Greatness starts small."
];

document.getElementById("quote").innerText =
  quotes[Math.floor(Math.random() * quotes.length)];
</script>

</body>
</html>
