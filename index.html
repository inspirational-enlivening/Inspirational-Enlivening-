<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspirational Enlivening - Book Store</title>

<style>
:root { --gold: #f0c14b; --dark: #111; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: var(--dark);
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 26px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 260px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
  text-align: center;
}

button {
  background: var(--gold);
  border: none;
  padding: 10px;
  cursor: pointer;
  margin-top: 8px;
  width: 100%;
}
</style>
</head>

<body>

<header>Inspirational Enlivening Book Store</header>

<div class="grid" id="books-grid"></div>

<script>

// ================= DATA =================
let books = JSON.parse(localStorage.getItem("books")) || [
  {
    id: 1,
    title: "Fear of Failing",
    price: 2000,
    img: "https://via.placeholder.com/300x400?text=Fear+of+Failing"
  }
];

let cart = [];

// ================= RENDER BOOKS =================
function renderBooks() {
  const grid = document.getElementById("books-grid");
  grid.innerHTML = "";

  books.forEach(book => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${book.img}" alt="${book.title}"
        onerror="this.src='https://via.placeholder.com/300x400?text=Book+Cover'">

      <div class="card-content">
        <h3>${book.title}</h3>
        <p><strong>₦${book.price}</strong></p>

        <button onclick="buyNow(${book.id})">Buy Now</button>
      </div>
    `;

    grid.appendChild(card);
  });
}

// ================= BUY =================
function buyNow(id) {
  const book = books.find(b => b.id === id);

  let message =
`📚 NEW ORDER

Book: ${book.title}
Price: ₦${book.price}

Payment Method: Opay
Account Number: 8166286285

Please confirm payment.`;

  window.open(
    "https://wa.me/2348166286285?text=" + encodeURIComponent(message),
    "_blank"
  );
}

// ================= INIT =================
renderBooks();

</script>

</body>
</html>
